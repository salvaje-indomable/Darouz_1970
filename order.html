<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darouz 1970 — Order</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&family=Noto+Naskh+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #111009; --bg2: #1a1208; --bg3: #201610;
    --amber: #f0a030; --amber-dim: #a06018; --gold: #f0c060;
    --text: #e0cca0; --text-dim: #907050; --text-faint: #504030;
    --border: #2e1e0a; --border2: #3a2a14;
    --green: #3a5530; --green-dark: #2e3f25; --green-light: #e8f0e0;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; font-weight: 300; line-height: 1.7; }
  body.ar { font-family: 'Noto Naskh Arabic', serif; }

  /* LANG BAR */
  .lang-bar { background: #0a0804; border-bottom: 0.5px solid var(--border); padding: 6px 40px; display: flex; justify-content: flex-end; gap: 4px; }
  body.ar .lang-bar { justify-content: flex-start; }
  .lang-btn { background: none; border: 0.5px solid var(--border2); color: var(--text-faint); font-size: 11px; padding: 3px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .lang-btn.active { background: var(--amber); color: #1a0a00; border-color: var(--amber); font-weight: 700; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 200; display: flex; justify-content: space-between; align-items: center; padding: 14px 40px; background: #0c0904ee; border-bottom: 0.5px solid var(--border); backdrop-filter: blur(8px); }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 17px; color: #f5c842; letter-spacing: 0.06em; text-decoration: none; text-shadow: 0 0 4px #f5c84260, 0 0 10px #e8a82040, 0 0 18px #c0701025; }
  body.ar .nav-logo { font-family: 'Noto Naskh Arabic', serif; font-size: 19px; letter-spacing: 0; }

  /* DRIP */
  .drip { width: 100%; height: 22px; overflow: hidden; background: #0c0904; }
  .drip svg { width: 100%; display: block; }

  /* BACK BAR */
  .back-bar { background: #0c0904; padding: 14px 40px; border-bottom: 0.5px solid var(--border); }
  .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-dim); text-decoration: none; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
  body.ar .back-link { flex-direction: row-reverse; letter-spacing: 0; text-transform: none; font-size: 13px; }
  .back-link:hover { color: var(--text); }
  .back-link svg { flex-shrink: 0; }
  body.ar .back-link svg { transform: scaleX(-1); }

  /* CAT TABS */
  .cat-tabs { max-width: 960px; margin: 0 auto; padding: 20px 40px 0; display: flex; gap: 8px; flex-wrap: wrap; }
  body.ar .cat-tabs { flex-direction: row-reverse; }
  .cat-tab { background: none; border: 0.5px solid var(--border2); color: var(--text-dim); font-size: 11px; padding: 5px 18px; border-radius: 20px; cursor: pointer; font-family: inherit; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.2s; white-space: nowrap; }
  body.ar .cat-tab { letter-spacing: 0; text-transform: none; font-size: 13px; }
  .cat-tab.active { background: var(--amber); color: #1a0a00; border-color: var(--amber); font-weight: 700; }
  .cat-tab:hover:not(.active) { border-color: var(--amber-dim); color: var(--text); }

  /* MENU AREA */
  .menu-area { max-width: 960px; margin: 0 auto; padding: 28px 40px 140px; }
  .cat-section { margin-bottom: 40px; }
  .cat-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); font-weight: 400; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border2); }
  body.ar .cat-title { font-family: 'Noto Naskh Arabic', serif; text-align: right; }

  /* ITEM GRID */
  .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

  /* ITEM CARD */
  .item-card { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; display: flex; flex-direction: column; }
  .item-card.in-cart { border-color: var(--green); }
  .item-img { width: 100%; height: 120px; overflow: hidden; }
  .item-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; }
  body.ar .item-body { text-align: right; }
  .item-name { font-size: 13px; font-weight: 400; color: #e8c880; margin-bottom: 4px; line-height: 1.3; }
  body.ar .item-name { font-size: 15px; }
  .item-desc { font-size: 11px; color: var(--text-faint); line-height: 1.5; flex: 1; margin-bottom: 12px; }
  body.ar .item-desc { font-size: 12px; }
  .item-controls { display: flex; align-items: center; justify-content: space-between; }
  body.ar .item-controls { flex-direction: row-reverse; }
  .qty-controls { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text-dim); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; padding-bottom: 1px; }
  .qty-btn:hover { background: var(--green); color: var(--green-light); border-color: var(--green); }
  .qty-num { font-size: 14px; color: var(--text); min-width: 20px; text-align: center; }
  .add-btn { background: var(--green); color: var(--green-light); border: none; border-radius: 6px; padding: 7px 18px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.06em; text-transform: uppercase; transition: background 0.2s; }
  body.ar .add-btn { letter-spacing: 0; text-transform: none; font-size: 13px; }
  .add-btn:hover { background: var(--green-dark); }

  /* FLOATING CART BUBBLE */
  .cart-bubble { position: fixed; bottom: 32px; right: 32px; z-index: 500; }
  body.ar .cart-bubble { right: auto; left: 32px; }
  .bubble-btn { background: var(--green); color: var(--green-light); border: none; border-radius: 50px; padding: 14px 22px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px #00000060; transition: background 0.2s, transform 0.15s; white-space: nowrap; }
  .bubble-btn:hover { background: var(--green-dark); transform: scale(1.03); }
  .bubble-count { background: var(--amber); color: #1a0a00; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .bubble-label { font-size: 13px; }
  .bubble-btn.hidden { display: none; }

  /* CART DRAWER */
  .cart-overlay { position: fixed; inset: 0; background: #00000070; z-index: 600; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 700; background: #0c0904; border-top: 0.5px solid var(--border2); border-radius: 20px 20px 0 0; max-height: 85vh; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
  .cart-drawer.open { transform: translateY(0); }
  .drawer-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  body.ar .drawer-header { flex-direction: row-reverse; }
  .drawer-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); font-weight: 400; }
  body.ar .drawer-title { font-family: 'Noto Naskh Arabic', serif; }
  .drawer-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .drawer-close:hover { color: var(--text); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .drawer-empty { text-align: center; color: var(--text-faint); font-size: 13px; padding: 32px 0; }
  .drawer-empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.3; }

  /* CUSTOMER FIELDS */
  .drawer-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  @media (max-width: 480px) { .drawer-fields { grid-template-columns: 1fr; } }
  .drawer-input { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 6px; padding: 10px 14px; font-size: 13px; color: var(--text); font-family: inherit; width: 100%; transition: border-color 0.2s; }
  body.ar .drawer-input { text-align: right; font-size: 14px; }
  .drawer-input::placeholder { color: #60402a; }
  .drawer-input:focus { outline: none; border-color: #f0a03060; }
  .drawer-input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px #1a1208 inset !important; -webkit-text-fill-color: #e0cca0 !important; }

  /* CART ITEMS */
  .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); gap: 12px; }
  body.ar .cart-item-row { flex-direction: row-reverse; }
  .cart-item-row:last-child { border-bottom: none; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; color: #e8c880; }
  body.ar .cart-item-name { font-size: 15px; text-align: right; }
  .cart-item-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .cart-qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text-dim); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .cart-qty-btn:hover { background: var(--green); color: var(--green-light); border-color: var(--green); }
  .cart-qty-num { font-size: 13px; color: var(--text); min-width: 18px; text-align: center; }

  /* SPECIAL REQUEST */
  .special-req-section { margin: 16px 0; }
  .special-req-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  body.ar .special-req-label { letter-spacing: 0; text-transform: none; font-size: 12px; text-align: right; }
  .special-req-input { width: 100%; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--text); font-family: inherit; resize: none; height: 70px; }
  body.ar .special-req-input { text-align: right; font-size: 13px; }
  .special-req-input:focus { outline: none; border-color: #f0a03060; }
  .special-req-input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px #1a1208 inset !important; -webkit-text-fill-color: #e0cca0 !important; }

  /* CHECKOUT BTN */
  .drawer-footer { padding: 12px 24px 28px; flex-shrink: 0; border-top: 0.5px solid var(--border); }
  .checkout-btn { width: 100%; background: var(--amber); color: #1a0a00; border: none; border-radius: 8px; padding: 15px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.08em; text-transform: uppercase; transition: background 0.2s; }
  body.ar .checkout-btn { letter-spacing: 0; text-transform: none; font-size: 15px; }
  .checkout-btn:hover { background: var(--gold); }
  .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* FOOTER */
  footer { background: #0a0804; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-faint); letter-spacing: 0.04em; border-top: 0.5px solid var(--border); flex-wrap: wrap; gap: 8px; }
  body.ar footer { flex-direction: row-reverse; letter-spacing: 0; font-size: 13px; }

  @media (max-width: 680px) {
    nav, .lang-bar, .back-bar { padding-left: 16px; padding-right: 16px; }
    .cat-tabs { padding: 14px 16px 0; gap: 6px; }
    .cat-tab { font-size: 10px; padding: 4px 12px; }
    .menu-area { padding: 20px 16px 140px; }
    .items-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .item-img { height: 90px; font-size: 28px; }
    .item-body { padding: 10px 10px; }
    .item-name { font-size: 12px; }
    .item-desc { font-size: 10px; }
    .add-btn { font-size: 10px; padding: 6px 12px; }
    .qty-btn { width: 24px; height: 24px; font-size: 14px; }
    .qty-num { font-size: 12px; }
    .cart-bubble { bottom: 20px; right: 16px; }
    body.ar .cart-bubble { right: auto; left: 16px; }
    .bubble-btn { padding: 12px 18px; font-size: 13px; }
    .cart-drawer { max-height: 90vh; }
    .drawer-header { padding: 14px 16px 10px; }
    .drawer-body { padding: 12px 16px; }
    .drawer-footer { padding: 10px 16px 24px; }
    .drawer-fields { grid-template-columns: 1fr; gap: 6px; }
    footer { flex-direction: column; text-align: center; padding: 14px 16px; }
  }
    .cat-tabs, .menu-area { padding-left: 20px; padding-right: 20px; }
    .cart-bubble { bottom: 20px; right: 20px; }
    body.ar .cart-bubble { right: auto; left: 20px; }
    footer { flex-direction: column; text-align: center; }
  }
</style>
</head>

<div class="lang-bar">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
  <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">عربي</button>
</div>

<nav>
  <a class="nav-logo" href="index.html" id="nav-logo">&#9670; Darouz 1970</a>
</nav>

<div class="drip" style="background:#0c0904;">
  <svg viewBox="0 0 1200 22" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,0 Q80,0 110,12 Q140,22 180,12 Q230,0 290,0 Q360,0 400,14 Q430,22 470,12 Q520,0 600,0 Q680,0 720,16 Q750,22 800,10 Q860,0 940,0 Q1010,0 1050,13 Q1080,22 1120,10 Q1160,0 1200,0 L1200,0 L0,0 Z" fill="#f0a030" opacity="0.75"/>
  </svg>
</div>


<div class="cat-tabs" id="cat-tabs">
  <button class="cat-tab active" onclick="scrollToCat('breakfast')" id="tab-breakfast">Breakfast</button>
  <button class="cat-tab" onclick="scrollToCat('lunch')" id="tab-lunch">Lunch</button>
  <button class="cat-tab" onclick="scrollToCat('sweets')" id="tab-sweets">Sweets</button>
</div>

<div class="menu-area">
  <div class="cat-section" id="cat-breakfast">
    <div class="cat-title" id="cat-title-breakfast">Breakfast</div>
    <div class="items-grid" id="grid-breakfast"></div>
  </div>
  <div class="cat-section" id="cat-lunch">
    <div class="cat-title" id="cat-title-lunch">Lunch</div>
    <div class="items-grid" id="grid-lunch"></div>
  </div>
  <div class="cat-section" id="cat-sweets">
    <div class="cat-title" id="cat-title-sweets">Sweets</div>
    <div class="items-grid" id="grid-sweets"></div>
  </div>
</div>

<!-- FLOATING CART BUBBLE -->
<div class="cart-bubble">
  <button class="bubble-btn hidden" id="bubble-btn" onclick="openDrawer()">
    <span class="bubble-count" id="bubble-count">0</span>
    <span class="bubble-label" id="bubble-label">View order</span>
  </button>
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="closeDrawer()"></div>

<!-- CART DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawer-title">Your order</div>
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-fields">
      <input class="drawer-input" type="text" id="cust-name" placeholder="Your name"/>
      <input class="drawer-input" type="text" id="cust-contact" placeholder="Phone or WhatsApp"/>
    </div>
    <div id="drawer-empty" class="drawer-empty">
      <div class="drawer-empty-icon">&#127828;</div>
      <span id="empty-text">Add items to get started</span>
    </div>
    <div id="cart-items-list"></div>
    <div class="special-req-section" id="special-req-section" style="display:none;">
      <div class="special-req-label" id="special-req-label">Special request</div>
      <textarea class="special-req-input" id="special-req" placeholder="e.g. extra olives, no onion, extra spicy..."></textarea>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="checkout-btn" id="checkout-btn" onclick="checkout()" disabled>
      <span id="checkout-label">Send order via WhatsApp</span>
    </button>
  </div>
</div>

<footer>
  <span id="footer-copy">&#169; 2025 Darouz 1970 &mdash; Latakia, Syria</span>
  <span id="footer-tag">Built by family, shared with our community</span>
</footer>

  ],
  lunch: [
    {id:'l1',en:{name:'Pesto chicken',desc:'Grilled chicken with pesto sauce'},ar:{name:'بستو نخاعات',desc:'دجاج مشوي مع صوص بستو'},icon:'🍗'},
    {id:'l2',en:{name:'Black neck',desc:'Grilled seasoned neck cuts'},ar:{name:'عانق سودة',desc:'قطع رقبة مشوية متبلة'},icon:'🍖'},
    {id:'l3',en:{name:'Kafta',desc:'Spiced ground meat patty'},ar:{name:'كفتة',desc:'كفتة لحمة متبلة'},icon:'🥩'},
    {id:'l4',en:{name:'Fajita',desc:'Peppers, onion & seasoned meat'},ar:{name:'فاهيتا',desc:'فليفلة، بصل، لحمة متبلة'},icon:'🌮'},
  ],
  sweets: [
    {id:'s1',en:{name:'Butter or cheese with jam',desc:'Strawberry or apricot jam'},ar:{name:'زبدة أو جبنة مع مربى',desc:'فريز أو مشمش'},icon:'🍓'},
    {id:'s2',en:{name:'Butter or cheese with honey',desc:'Drizzled with natural honey'},ar:{name:'زبدة أو جبنة مع عسل',desc:'مع عسل طبيعي'},icon:'🍯'},
    {id:'s3',en:{name:'Bacon with honey & banana',desc:'Sweet & savory combo'},ar:{name:'بيكون مع عسل وموز',desc:'حلو ومالح'},icon:'🍌'},
    {id:'s4',en:{name:'Nutella with banana',desc:'Creamy Nutella, fresh banana'},ar:{name:'نوتيلا مع موز',desc:'نوتيلا كريمية مع موز طازج'},icon:'🍫'},
  ]
};

let cart = {};
let currentLang = 'en';

function renderMenus() {
  ['breakfast','lunch','sweets'].forEach(cat => {
    const grid = document.getElementById('grid-'+cat);
    grid.innerHTML = '';
    MENU[cat].forEach(item => {
      const t = item[currentLang];
      const qty = cart[item.id] ? cart[item.id].qty : 0;
      grid.innerHTML += `
        <div class="item-card ${qty>0?'in-cart':''}" id="card-${item.id}">
          <div class="item-img"><img src="${item.img || 'sandwich_card.jpg'}" alt="${t.name}" style="width:100%;height:100%;object-fit:cover;display:block;"/></div>
          <div class="item-body">
            <div class="item-name">${t.name}</div>
            <div class="item-desc">${t.desc}</div>
            <div class="item-controls">
              ${qty > 0 ? `
                <div class="qty-controls">
                  <button class="qty-btn" onclick="changeQty('${item.id}',-1)">&#8722;</button>
                  <span class="qty-num">${qty}</span>
                  <button class="qty-btn" onclick="changeQty('${item.id}',1)">&#43;</button>
                </div>
              ` : `
                <button class="add-btn" onclick="addItem('${item.id}')">
                  ${currentLang==='ar'?'أضف':'Add'}
                </button>
              `}
            </div>
          </div>
        </div>`;
    });
  });
}

function findItem(id) {
  for (const cat of Object.values(MENU)) {
    const f = cat.find(i => i.id===id);
    if (f) return f;
  }
}

function addItem(id) {
  if (!cart[id]) cart[id] = {qty:0, item:findItem(id)};
  cart[id].qty = 1;
  updateCart();
  renderMenus();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCart();
  renderMenus();
}

function updateCart() {
  const total = Object.values(cart).reduce((s,v)=>s+v.qty, 0);
  const bubbleBtn = document.getElementById('bubble-btn');
  document.getElementById('bubble-count').textContent = total;
  bubbleBtn.classList.toggle('hidden', total === 0);

  const isAr = currentLang === 'ar';
  document.getElementById('bubble-label').textContent = total > 0
    ? (isAr ? `عرض الطلب (${total})` : `View order (${total})`)
    : '';

  const listEl = document.getElementById('cart-items-list');
  const emptyEl = document.getElementById('drawer-empty');
  const checkoutBtn = document.getElementById('checkout-btn');
  const specialSection = document.getElementById('special-req-section');

  if (total === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    checkoutBtn.disabled = true;
    specialSection.style.display = 'none';
  } else {
    emptyEl.style.display = 'none';
    checkoutBtn.disabled = false;
    specialSection.style.display = 'block';
    listEl.innerHTML = '';
    Object.values(cart).forEach(entry => {
      const t = entry.item[currentLang];
      listEl.innerHTML += `
        <div class="cart-item-row">
          <div class="cart-item-info">
            <div class="cart-item-name">${t.name}</div>
          </div>
          <div class="cart-item-controls">
            <button class="cart-qty-btn" onclick="changeQty('${entry.item.id}',-1)">&#8722;</button>
            <span class="cart-qty-num">${entry.qty}</span>
            <button class="cart-qty-btn" onclick="changeQty('${entry.item.id}',1)">&#43;</button>
          </div>
        </div>`;
    });
  }
}

function openDrawer() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function scrollToCat(cat) {
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+cat).classList.add('active');
  document.getElementById('cat-'+cat).scrollIntoView({behavior:'smooth',block:'start'});
}

function checkout() {
  const name = document.getElementById('cust-name').value.trim();
  const contact = document.getElementById('cust-contact').value.trim();
  const note = document.getElementById('special-req').value.trim();
  const total = Object.values(cart).reduce((s,v)=>s+v.qty,0);
  if (total===0) return;

  const orderNum = 'ORD-'+Date.now().toString().slice(-6);
  const now = new Date();
  const timestamp = now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  let itemLines = '';
  Object.values(cart).forEach(entry => {
    const t = entry.item[currentLang];
    itemLines += `%0A• ${encodeURIComponent(t.name)} x${entry.qty}`;
  });

  const isAr = currentLang==='ar';
  const msg = isAr
    ? `طلب جديد من دروز ١٩٧٠%0A━━━━━━━━━━━━━━%0A🔢 رقم الطلب: ${encodeURIComponent(orderNum)}%0A🕐 الوقت: ${encodeURIComponent(timestamp)}%0A━━━━━━━━━━━━━━%0A👤 الاسم: ${encodeURIComponent(name||'غير محدد')}%0A📞 التواصل: ${encodeURIComponent(contact||'غير محدد')}%0A━━━━━━━━━━━━━━%0A🥪 الطلب:${itemLines}${note?`%0A%0A📋 ملاحظة: ${encodeURIComponent(note)}`:''}%0A━━━━━━━━━━━━━━`
    : `New order from Darouz 1970%0A━━━━━━━━━━━━━━%0A🔢 Order: ${encodeURIComponent(orderNum)}%0A🕐 Time: ${encodeURIComponent(timestamp)}%0A━━━━━━━━━━━━━━%0A👤 Name: ${encodeURIComponent(name||'Not provided')}%0A📞 Contact: ${encodeURIComponent(contact||'Not provided')}%0A━━━━━━━━━━━━━━%0A🥪 Items:${itemLines}${note?`%0A%0A📋 Note: ${encodeURIComponent(note)}`:''}%0A━━━━━━━━━━━━━━`;

  window.open('https://wa.me/17653378787?text='+msg,'_blank');
  cart = {};
  document.getElementById('cust-name').value='';
  document.getElementById('cust-contact').value='';
  document.getElementById('special-req').value='';
  closeDrawer();
  updateCart();
  renderMenus();
}

const T = {
  en: {
    'nav-logo':'◆ Darouz 1970','back-link':'← Back to home',
    'tab-breakfast':'Breakfast','tab-lunch':'Lunch','tab-sweets':'Sweets',
    'cat-title-breakfast':'Breakfast','cat-title-lunch':'Lunch','cat-title-sweets':'Sweets',
    'drawer-title':'Your order','empty-text':'Add items to get started',
    'special-req-label':'Special request','checkout-label':'Send order via WhatsApp',
    'footer-copy':'© 2025 Darouz 1970 — Latakia, Syria','footer-tag':'Built by family, shared with our community'
  },
  ar: {
    'nav-logo':'◆ دروز ١٩٧٠','back-link':'العودة للرئيسية →',
    'tab-breakfast':'فطور','tab-lunch':'الغداء','tab-sweets':'الحلو',
    'cat-title-breakfast':'فطور','cat-title-lunch':'الغداء','cat-title-sweets':'الحلو',
    'drawer-title':'طلبك','empty-text':'أضف أصنافاً للبدء',
    'special-req-label':'طلب خاص','checkout-label':'أرسل الطلب عبر واتساب',
    'footer-copy':'© ٢٠٢٥ دروز ١٩٧٠ — اللاذقية، سوريا','footer-tag':'بنيناه بعيلة، شاركناه مع حيّنا'
  }
};

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang==='ar'?'rtl':'ltr';
  document.body.classList.toggle('ar', lang==='ar');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-ar').classList.toggle('active', lang==='ar');
  const t = T[lang];
  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = t[id];
  });
  document.getElementById('cust-name').placeholder = lang==='ar'?'اسمك':'Your name';
  document.getElementById('cust-contact').placeholder = lang==='ar'?'هاتف أو واتساب':'Phone or WhatsApp';
  document.getElementById('special-req').placeholder = lang==='ar'?'مثال: بدون بصل، زيادة زيتون...':'e.g. extra olives, no onion, extra spicy...';
  renderMenus();
  updateCart();
}

renderMenus();
</script>
